name: Export Supabase JSON

on:
  schedule:
    # 00.15 UTC = 03.15 Suomen kesäaikaa / 02.15 talviaikaa
    - cron: "15 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: supabase-json-export
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-save @supabase/supabase-js@2

      - name: Export JSON files
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/export-json.mjs

      - name: Commit changed exports
        run: |
          if git diff --quiet -- \
            suomen_murrosvaiheet_syvennetty.json \
            artikkelit.json \
            yhdistys.json; then
            echo "JSON-tiedostoissa ei ole muutoksia."
            exit 0
          fi

          git config user.name "murrosmatriisi-export-bot"
          git config user.email "actions@users.noreply.github.com"

          git add \
            suomen_murrosvaiheet_syvennetty.json \
            artikkelit.json \
            yhdistys.json

          git commit -m "Päivitä Murrosmatriisin JSON-exportit"
          git push
